name: Build Desktop App

# Tự build app cho cả Windows (.exe) và macOS (.dmg) trên máy ảo của GitHub —
# máy dev hiện tại là Windows nên không tự build được bản Mac, phải nhờ CI.
# Đẩy tag dạng v1.0.0 sẽ tự đính file cài vào GitHub Release; có thể bấm chạy
# tay (workflow_dispatch) để build thử mà chưa cần tạo release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: wordnest-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
          if-no-files-found: ignore

      - name: Đính file cài vào GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
