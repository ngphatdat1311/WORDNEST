<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<style>
  body {
    width: 260px; margin: 0; padding: 14px;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #FDFAF5; color: #3A3228;
  }
  h1 { font-size: 14px; margin: 0 0 10px; color: #8B6F47; }
  .empty { font-size: 12px; color: #9A8F7E; text-align: center; padding: 14px 0; }
  ul { list-style: none; margin: 0; padding: 0; max-height: 220px; overflow-y: auto; }
  li {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 4px; border-bottom: 1px solid #EDE8DC; font-size: 13px;
  }
  li:last-child { border-bottom: none; }
  button.rm {
    border: none; background: none; color: #9A8F7E; cursor: pointer; font-size: 12px; padding: 2px 6px;
  }
  button.rm:hover { color: #B85450; }
  .hint { font-size: 11px; color: #9A8F7E; margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>
  <h1>📥 Hàng đợi WordNest</h1>
  <div id="list"></div>
  <div class="hint">Bôi đen một từ tiếng Anh trên trang web bất kỳ rồi bấm nút "+ WordNest" hiện lên, hoặc chuột phải → "Thêm vào WordNest".</div>
  <script src="popup.js"></script>
</body>
</html>
